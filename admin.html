<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Админка — ответы на свидание</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <main class="page">
    <section class="card">
      <div class="admin-head">
        <p class="mini-title">личная админка</p>
        <h1>Ответы на свидание</h1>
        <p>Введи пароль администратора, чтобы увидеть настроение, рассказ о дне, выбранную дату, еду и пожелания.</p>
      </div>

      <div class="admin-login" id="loginBox">
        <label class="field">
          <span>Пароль администратора</span>
          <input type="password" id="adminPassword" placeholder="Введи пароль" />
        </label>
        <button class="btn primary" id="loginBtn">Показать ответы 💌</button>
        <p class="form-message" id="adminMessage"></p>
      </div>

      <div class="admin-actions hidden" id="adminActions">
        <button class="btn soft" id="refreshBtn">Обновить</button>
        <button class="btn soft" id="logoutBtn">Выйти</button>
      </div>

      <div class="admin-grid" id="answers"></div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
